name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        go: ["1.26", "stable"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -timeout 120s ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  modernize:
    # Fails if `go fix` would change anything — keep the code modernized.
    # Requires a Go toolchain new enough to ship the rewritten `go fix` (1.26+).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: go fix produces no diff
        run: |
          diff=$(go fix -diff ./...)
          if [ -n "$diff" ]; then
            echo "$diff"
            echo "::error::go fix would modernize code; run 'go fix ./...' and commit."
            exit 1
          fi
